name: TMX Live Sync

on:
  schedule:
    # Every 45 min during TMX trade hours, 08:00-17:00 EAT (05:00-14:00 UTC), Mon-Fri
    - cron: '0,45 5-13 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write
  issues: write

concurrency:
  group: tmx-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch and parse TMX session data
        id: fetch
        run: python scripts/tmx_sync.py

      - name: Commit if data changed
        run: |
          if [ -z "$(git status --porcelain -- tmx_live.json)" ]; then
            echo "No change in TMX data; nothing to commit."
          else
            git config user.name  "furrow-tmx-bot"
            git config user.email "actions@github.com"
            git add tmx_live.json
            git commit -m "TMX live sync: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Notify on failure (open or update issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'TMX live sync is failing';
            const body = `The TMX sync workflow failed on ${new Date().toUTCString()}.\n\n` +
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n` +
              'The site keeps showing the last confirmed session data (fail-safe). ' +
              'Likely causes: TMX changed or unpublished their Datawrapper chart (ID ZJSS6), ' +
              'or the table structure changed. Check the run log above.';
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'tmx-pipe'
            });
            if (issues.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issues.data[0].number, body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['tmx-pipe']
              });
            }
