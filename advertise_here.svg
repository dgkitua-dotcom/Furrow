<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">

  <!-- Background -->
  <rect width="600" height="600" fill="#0B1C2E"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(201,168,76,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#grid)"/>

  <!-- Gold dashed border -->
  <rect x="16" y="16" width="568" height="568" rx="14" ry="14" fill="none" stroke="#C9A84C" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.5"/>

  <!-- FURROW wordmark — single clean text element -->
  <text x="300" y="200" font-family="Georgia, serif" font-size="78" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="8">FURROW</text>

  <!-- Gold underline — only under the two R's (approximate centre portion) -->
  <line x1="252" y1="212" x2="348" y2="212" stroke="#C9A84C" stroke-width="3.5"/>

  <!-- Powered by tagline -->
  <text x="300" y="242" font-family="Arial, sans-serif" font-size="11" fill="#C9A84C" text-anchor="middle" letter-spacing="3.5" opacity="0.85">POWERED BY GABRISON CAPITAL</text>

  <!-- Divider -->
  <line x1="160" y1="268" x2="440" y2="268" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>

  <!-- Main CTA -->
  <text x="300" y="328" font-family="Georgia, serif" font-size="36" font-weight="600" fill="#C9A84C" text-anchor="middle">Advertise Here</text>

  <!-- Sub lines -->
  <text x="300" y="372" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" text-anchor="middle">Reach Tanzania's agricultural community</text>
  <text x="300" y="396" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" text-anchor="middle">Farmers · Buyers · Transporters · Investors</text>

  <!-- Divider -->
  <line x1="160" y1="422" x2="440" y2="422" stroke="#C9A84C" stroke-width="0.8" opacity="0.3"/>

  <!-- Contact -->
  <text x="300" y="460" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">info@gabrisoncapital.com</text>
  <text x="300" y="480" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)" text-anchor="middle">www.joinfurrow.com</text>

  <!-- Corner dots -->
  <circle cx="110" cy="300" r="3" fill="#C9A84C" opacity="0.25"/>
  <circle cx="490" cy="300" r="3" fill="#C9A84C" opacity="0.25"/>

</svg>
